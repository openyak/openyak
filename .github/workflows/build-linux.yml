name: Build Linux

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop-tauri/src-tauri

      - name: Install frontend dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: Build frontend
        run: cd frontend && npx next build
        env:
          DESKTOP_BUILD: "true"
          NEXT_PUBLIC_DESKTOP_BUILD: "true"

      - name: Build backend (PyInstaller)
        run: |
          cd backend
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt pyinstaller
          pyinstaller openyak.spec --noconfirm

      - name: Download Node.js runtime
        run: cd backend && python3 scripts/download_node.py

      - name: Build Tauri
        run: |
          cd desktop-tauri
          npx @tauri-apps/cli build --config build.linux-x64.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-bundle
          path: |
            desktop-tauri/src-tauri/target/release/bundle/deb/*.deb
            desktop-tauri/src-tauri/target/release/bundle/appimage/*.AppImage
            desktop-tauri/src-tauri/target/release/bundle/rpm/*.rpm
